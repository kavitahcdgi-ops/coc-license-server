<!DOCTYPE html>
<html>
<head>
    <title>COC License Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .header {
            background: #111827;
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 6px;
            border: none;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #374151;
            text-align: left;
        }

        th {
            background: #1f2937;
        }

        .btn {
            padding: 6px 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="header">
    🔐 COC License Admin Dashboard
</div>

<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="card">📦 Total Licenses</div>
        <div class="card">🟢 Active</div>
        <div class="card">🔴 Inactive</div>
    </div>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search license..." onkeyup="filterTable()">

    <!-- TABLE -->
    <table id="table">
        <tr>
            <th>ID</th>
            <th>License</th>
            <th>HWID</th>
            <th>Active</th>
            <th>Expiry</th>
            <th>Action</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>
                <button class="btn" onclick="deleteKey('{{row[1]}}')">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
function filterTable() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.getElementById("table").getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
        let text = rows[i].innerText.toLowerCase();
        rows[i].style.display = text.includes(input) ? "" : "none";
    }
}

function deleteKey(key) {
    fetch("/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({license: key})
    }).then(() => location.reload());
}
</script>

</body>
</html>
