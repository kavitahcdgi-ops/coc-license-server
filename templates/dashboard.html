<!DOCTYPE html>
<html>
<head>
    <title>COC License Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            border-radius: 18px;
            background: rgba(30, 41, 59, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            animation: fadeDown 0.5s ease;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #fbbf24, #f97316);
            -webkit-background-clip: text;
            color: transparent;
        }

        .logout-btn {
            padding: 10px 18px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239,68,68,0.3);
        }

        .card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #fbbf24;
        }

        input {
            background: rgba(2,6,23,0.8);
            border: 1px solid #334155;
            color: white;
            padding: 12px 16px;
            border-radius: 30px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 10px rgba(251,191,36,0.2);
        }

        .generate-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            border: none;
        }

        .gen-btn {
            padding: 12px 22px;
            border-radius: 30px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .gen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34,197,94,0.3);
        }

        .search-box {
            margin: 15px 0;
        }

        .search-box input {
            width: 100%;
            max-width: 350px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(15,23,42,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px;
            background: rgba(30,41,59,0.9);
            color: #fbbf24;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.04);
            transition: 0.2s;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(34,197,94,0.15);
            color: #22c55e;
            border: 1px solid #22c55e;
        }

        .status-inactive {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .copy-btn, .del-btn {
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin: 2px;
            transition: 0.2s;
        }

        .copy-btn {
            background: #f59e0b;
            color: black;
        }

        .del-btn {
            background: #ef4444;
            color: white;
        }

        .copy-btn:hover, .del-btn:hover {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 30px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .toast.error {
            border-left: 4px solid #ef4444;
            background: #1e293b;
            color: #fecaca;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }

        @keyframes fadeDown {
            from {opacity:0; transform: translateY(-10px);}
            to {opacity:1; transform: translateY(0);}
        }

        @media (max-width: 768px) {
            .generate-box { flex-direction: column; }
            input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔐 COC License Manager</h1>
        <a class="logout-btn" href="/logout">Logout</a>
    </div>

    <div class="card">
        <div class="card-title">✨ Generate License</div>
        <div class="generate-box">
            <input type="number" id="days" value="7" placeholder="Days">
            <button class="gen-btn" onclick="generateLicense()">Generate & Copy</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search license / HWID..." onkeyup="filterTable()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>ID</th><th>License</th><th>HWID</th><th>Status</th><th>Expiry</th><th>Actions</th></tr>
            </thead>
            <tbody id="licenseTableBody">
                <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer">⚔ COC License System | HWID binding active</div>
</div>
<div class="toast" id="toast"></div>

<script>
    let licensesData = [];

    function showToast(msg, isError = false) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.classList.remove("error");
        if (isError) t.classList.add("error");
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }

    async function loadLicenses() {
        try {
            const res = await fetch("/api/licenses");
            const data = await res.json();
            licensesData = data;
            renderTable(data);
        } catch(e) {
            showToast("Failed to load licenses", true);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById("licenseTableBody");
        if (!data.length) {
            tbody.innerHTML = "<tr><td colspan='6'>📭 No licenses found</td></tr>";
            return;
        }
        tbody.innerHTML = data.map(r => `
            <tr>
                <td>${r[0]}</td>
                <td><code>${r[1]}</code></td>
                <td>${r[2] || "—"}</td>
                <td><span class="status-badge ${r[3] ? 'status-active' : 'status-inactive'}">${r[3] ? "Active" : "Inactive"}</span></td>
                <td>${r[4]}</td>
                <td>
                    <button class="copy-btn" onclick="copyKey('${r[1]}')">📋 Copy</button>
                    <button class="del-btn" onclick="deleteLicense('${r[1]}')">🗑 Delete</button>
                </td>
            </tr>
        `).join("");
    }

    async function generateLicense() {
        const days = document.getElementById("days").value;
        if (!days || isNaN(days) || parseInt(days) <= 0) {
            showToast("Please enter a valid number of days", true);
            return;
        }

        try {
            const res = await fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": "LAKHAN_84411004778"   // ✅ FIXED: API key added
                },
                body: JSON.stringify({ days: parseInt(days) })
            });

            const data = await res.json();
            if (data.license) {
                navigator.clipboard.writeText(data.license);
                showToast(`✅ Generated & Copied: ${data.license}`);
                loadLicenses();  // refresh table
            } else {
                showToast(`❌ Error: ${data.status || "Unknown"}`, true);
            }
        } catch (err) {
            showToast("Server error. Please try again.", true);
        }
    }

    async function deleteLicense(key) {
        if (!confirm(`Delete license ${key}?`)) return;
        try {
            const res = await fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ license: key })
            });
            if (res.ok) {
                showToast("✅ License deleted");
                loadLicenses();
            } else {
                showToast("Delete failed", true);
            }
        } catch(e) {
            showToast("Error deleting", true);
        }
    }

    function copyKey(key) {
        navigator.clipboard.writeText(key);
        showToast(`📋 Copied: ${key}`);
    }

    function filterTable() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        if (!query) {
            renderTable(licensesData);
        } else {
            const filtered = licensesData.filter(r =>
                r[1].toLowerCase().includes(query) ||
                (r[2] && r[2].toLowerCase().includes(query))
            );
            renderTable(filtered);
        }
    }

    loadLicenses();
</script>
</body>
</html>
