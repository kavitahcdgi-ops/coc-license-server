<!DOCTYPE html>
<html>
<head>
<title>License Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
padding:15px;
background:#111827;
font-size:20px;
font-weight:bold;
}

/* STATS */
.stats{
display:flex;
gap:10px;
padding:20px;
}

.card{
flex:1;
background:#1f2937;
padding:15px;
border-radius:12px;
text-align:center;
}

/* GENERATE BOX */
.generate-box{
margin:20px;
padding:20px;
background:#1f2937;
border-radius:12px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
width:150px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* BUTTONS */
.genbtn{background:green;color:white;}
.del{background:red;color:white;}
.ext{background:#2563eb;color:white;}
.copy{background:#f59e0b;color:black;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #374151;
}

th{
background:#1f2937;
}

a{
color:white;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
🔐 COC License Dashboard
<a href="/logout" style="float:right;color:white;">Logout</a>
</div>

<!-- STATS -->
<div class="stats">
<div class="card">📦 Total<br><h2>{{total}}</h2></div>
<div class="card">🟢 Active<br><h2>{{active}}</h2></div>
<div class="card">🔴 Inactive<br><h2>{{inactive}}</h2></div>
</div>

<!-- GENERATE -->
<div class="generate-box">
<h3>🔥 Generate License</h3>

<input id="days" placeholder="Days (7 / 15 / 30)">
<button class="genbtn" onclick="generate()">Generate</button>
</div>

<!-- TABLE -->
<table>
<tr>
<th>ID</th>
<th>License</th>
<th>HWID</th>
<th>Status</th>
<th>Expiry</th>
<th>Actions</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>

<button class="copy" onclick="copyKey('{{row[1]}}')">Copy</button>
<button class="del" onclick="del('{{row[1]}}')">Delete</button>
<button class="ext" onclick="ext('{{row[1]}}')">Extend</button>

</td>
</tr>
{% endfor %}

</table>

<script>

/* GENERATE */
function generate(){
let days = document.getElementById("days").value;

fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":"coc_api_9x7f2k_secure"
},
body:JSON.stringify({days:days})
})
.then(r=>r.json())
.then(d=>{
alert("Generated: " + d.license);
location.reload();
});
}

/* DELETE */
function del(k){
fetch("/delete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({license:k})
}).then(()=>location.reload());
}

/* EXTEND */
function ext(k){
let d = prompt("Enter days to extend:");
fetch("/extend",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({license:k,days:d})
}).then(()=>location.reload());
}

/* COPY LICENSE */
function copyKey(key){
navigator.clipboard.writeText(key);
alert("Copied: " + key);
}

</script>

</body>
</html>
