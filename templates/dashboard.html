<!DOCTYPE html>
<html>
<head>
    <title>COC License Dashboard</title>
    <style>
        body {
            margin:0;
            font-family: Arial;
            background:#0f172a;
            color:white;
        }

        .header {
            background:#111827;
            padding:15px;
            font-size:20px;
            font-weight:bold;
        }

        .container {
            padding:20px;
        }

        .stats {
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .card {
            background:#1f2937;
            padding:15px;
            border-radius:10px;
            flex:1;
            text-align:center;
        }

        .card h2 {
            margin:5px 0 0 0;
        }

        input {
            padding:10px;
            width:300px;
            margin-bottom:15px;
            border-radius:5px;
            border:none;
        }

        table {
            width:100%;
            border-collapse:collapse;
            background:#111827;
            border-radius:10px;
            overflow:hidden;
        }

        th, td {
            padding:10px;
            border-bottom:1px solid #374151;
            text-align:left;
        }

        th {
            background:#1f2937;
        }

        .btn {
            padding:5px 10px;
            background:red;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover {
            background:darkred;
        }
    </style>
</head>
<body>

<div class="header">
    🔐 COC License Admin Dashboard
    <a href="/logout" style="float:right;color:white;">Logout</a>
</div>

<div class="container">

    <div class="stats">
        <div class="card">📦 Total<br><h2>{{total}}</h2></div>
        <div class="card">🟢 Active<br><h2>{{active}}</h2></div>
        <div class="card">🔴 Inactive<br><h2>{{inactive}}</h2></div>
    </div>

    <input type="text" id="search" placeholder="Search license..." onkeyup="filterTable()">

    <table id="table">
        <tr>
            <th>ID</th>
            <th>License</th>
            <th>HWID</th>
            <th>Active</th>
            <th>Expiry</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
function filterTable() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.getElementById("table").getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
        rows[i].style.display =
            rows[i].innerText.toLowerCase().includes(input) ? "" : "none";
    }
}
</script>

</body>
</html>
