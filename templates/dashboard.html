<!DOCTYPE html>
<html>
<head>
    <title>License Dashboard</title>
    <style>
        body {margin:0;font-family:Arial;background:#0f172a;color:white;}
        .header{padding:15px;background:#111827;font-size:20px;}
        .stats{display:flex;gap:10px;padding:20px;}
        .card{flex:1;background:#1f2937;padding:15px;border-radius:10px;text-align:center;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px;border-bottom:1px solid #374151;}
        th{background:#1f2937;}
        button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;}
        .del{background:red;color:white;}
        .ext{background:green;color:white;}
    </style>
</head>
<body>

<div class="header">🔐 License Dashboard <a href="/logout" style="float:right;color:white;">Logout</a></div>

<div class="stats">
    <div class="card">Total<br><h2>{{total}}</h2></div>
    <div class="card">Active<br><h2>{{active}}</h2></div>
    <div class="card">Inactive<br><h2>{{inactive}}</h2></div>
</div>

<table>
<tr>
<th>ID</th><th>License</th><th>HWID</th><th>Active</th><th>Expiry</th><th>Actions</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>
<button class="del" onclick="del('{{row[1]}}')">Delete</button>
<button class="ext" onclick="ext('{{row[1]}}')">Extend</button>
</td>
</tr>
{% endfor %}

</table>

<script>
function del(k){
fetch('/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({license:k})})
.then(()=>location.reload())
}

function ext(k){
let d=prompt("Days?");
fetch('/extend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({license:k,days:d})})
.then(()=>location.reload())
}
</script>

</body>
</html>
